; PlatformIO Project Configuration File
; POE-2412 — LD2412 fork pro Prokyber ESP32-STICK aktivní POE (LAN8720A RMII Ethernet)

[common]
platform = espressif32 @ 6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, default
board_build.partitions = partitions_16mb.csv
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -D NO_BLUETOOTH=1
    -D USE_ETHERNET=1
    ; SSE queue cap: default 32 x ~1.5 kB telemetry = ~48 kB transient heap
    ; grab when a browser tab sleeps (measured min_heap dips to 35 kB on IDF5).
    ; Telemetry is periodic - dropping frames for a slow client is harmless.
    -D SSE_MAX_QUEUED_MESSAGES=8
lib_deps =
    bblanchon/ArduinoJson
    knolleary/PubSubClient
    ; v4.1.3-poe-wifi: swap z opusteneho me-no-dev/* na komunitni fork ESP32Async/*.
    ; me-no-dev/AsyncTCP + ESPAsyncWebServer (last release 2021-2022) mely race
    ; conditions v digest auth parseru a TCP close handlingu — projevovalo se
    ; jako alternujici 200/401/empty-reply/000 pod opakovanymi requesty (zhorsene
    ; na Ethernetu kvuli ESP-IDF tcpip_thread). API drop-in kompatibilni.
    ; v5.0.2-rc1: pin na konkretni commit/tag (predtim bez pinu = nedeterministicky build).
    ; AsyncTCP v3.4.10 = 0f5b54654a0a1280e1f19685aa7bc35865008a85
    ; ESPAsyncWebServer = f52055968200266b5ea9450457354fcc6a1b6ee9 (cached, known-good)
    https://github.com/ESP32Async/AsyncTCP.git#0f5b54654a0a1280e1f19685aa7bc35865008a85
    https://github.com/ESP32Async/ESPAsyncWebServer.git#f52055968200266b5ea9450457354fcc6a1b6ee9
    cotestatnt/AsyncTelegram2
    ; ESPAsyncWiFiManager ODSTRANEN — zadna WiFi

[env:esp32_poe]
extends = common
build_flags =
    -std=gnu++17
    -D NO_BLUETOOTH=1
    -D SERIAL_DEBUG=1
    -D USE_ETHERNET=1
    -D RADAR_RX_PIN=33
    -D RADAR_TX_PIN=32
    -D RADAR_OUT_PIN=4
    -D ETH_PHY_TYPE=ETH_PHY_LAN8720
    -D ETH_PHY_ADDR=1
    -D ETH_PHY_MDC=23
    -D ETH_PHY_MDIO=18
    -D ETH_CLK_MODE=ETH_CLOCK_GPIO17_OUT

[env:ota_poe_dev]
extends = env:esp32_poe
upload_protocol = espota
upload_port = 192.168.X.X
upload_flags =
    ; --auth=<password>  (don't commit real password here — set in platformio.ini.local)

; ============================================================================
; POE + WiFi CSI (radar + CSI fusion on single board)
; Ethernet = network, WiFi = CSI sensor only
; ============================================================================
; ⚠️ FLASH SIZE MUSÍ SEDĚT NA FYZICKÝ ČIP — jinak BOOTLOOP (bootloader:
;   "Detected size(8192k) smaller than header(16384k). Probe failed").
;   esp32_poe_csi    = 16MB (produkční nody, OUI F4:2D:C9). DEFAULT.
;   esp32_poe_csi_8mb = 8MB  (lab kus ESP32-D0WD-V3, OUI 08:B6:1F).
; OVĚŘ čip PŘED flashem:  esptool --port /dev/ttyUSBx flash_id
;   → "Device: 4018" = 16MB → esp32_poe_csi
;   → "Device: 4017" = 8MB  → esp32_poe_csi_8mb
; (POZOR: API /api/health `flash_size` i ESP.getFlashChipSize() = KONFIGUROVANÁ
;  velikost z build headeru, NE fyzická — neslouží k ověření čipu.)
[env:esp32_poe_csi]
extends = env:esp32_poe
build_flags =
    ${env:esp32_poe.build_flags}
    -D USE_CSI=1
    -D FW_VERSION=\"v5.1.1-poe-wifi\"

; Board variant s 8MB flash (lab kus, ESP32-D0WD-V3). Produkce = 16MB.
; Stejný kód jako esp32_poe_csi, jen flash size + partition layout pro 8MB.
; Flashuj JEN na čip s JEDEC 4017 (viz varování výše).
[env:esp32_poe_csi_8mb]
extends = env:esp32_poe_csi
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = partitions_8mb.csv

[env:ota_poe_csi]
extends = env:esp32_poe_csi
upload_protocol = espota
upload_port = 192.168.X.X
upload_flags =
    ; --auth=<password>  (don't commit real password here — set in platformio.ini.local)

; ============================================================================
; IDF 5.x / Arduino 3.x MIGRACE (cíl v5.1.0) — komunitní pioarduino platform
; Spec: docs/superpowers/specs/2026-07-02-idf5-arduino3-migration.md
; 55.03.39 = Arduino-ESP32 3.3.9 / ESP-IDF 5.5.4
; Stávající envy (espressif32@6.9.0 = Arduino 2.0.17 / IDF 4.4.7) NEDOTČENY —
; oba stacky se buildí vedle sebe, kód je guardovaný ESP_ARDUINO_VERSION_MAJOR.
; ============================================================================
[env:esp32_poe_csi_idf5]
extends = env:esp32_poe_csi
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
build_flags =
    ${env:esp32_poe.build_flags}
    -D USE_CSI=1
    -D FW_VERSION=\"v5.1.1-poe-wifi\"

; 8MB varianta pro test ESP .29/.33 (JEDEC 4017) — první bring-up IDF5 stacku.
[env:esp32_poe_csi_idf5_8mb]
extends = env:esp32_poe_csi_idf5
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = partitions_8mb.csv

; ============================================================================
; KABELOVÝ UPLOAD (první flash nebo recovery)
; pio run -e esp32_poe --target upload
; pio run -e esp32_poe_csi --target upload  (s WiFi CSI)
; ============================================================================

; ============================================================================
; NATIVNÍ UNIT TESTY (bez hardwaru) — pio test -e native
; Čisté headery v include/services/ (AuthLockout, metrics_text, ml_features…)
; nesmí záviset na Arduino.h, aby šly testovat na hostu.
; ============================================================================
[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags = -std=gnu++17
