name: PlatformIO build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [esp32_poe, esp32_poe_csi]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO + pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ matrix.env }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ matrix.env }}-
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Provision placeholder secrets
        run: |
          [ -f include/secrets.h ] || cp include/secrets.h.example include/secrets.h
          [ -f include/known_devices.h ] || cp include/known_devices.h.example include/known_devices.h

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}

      - name: Firmware size report
        if: always()
        run: pio run -e ${{ matrix.env }} --target size 2>&1 | tail -40 || true
